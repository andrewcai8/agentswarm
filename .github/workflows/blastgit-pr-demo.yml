name: Blastgit PR Demo
run-name: Blastgit PR Demo #${{ github.event.pull_request.number || inputs.pr_number || 'unknown' }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to render
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: blastgit-pr-demo-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  render-demo:
    name: Render PR demo video
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve PR metadata and demo target
        id: meta
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const rawPrInput = String(core.getInput('pr_number') || context.payload.inputs?.pr_number || '').trim();
            const parsedInput = rawPrInput ? Number(rawPrInput) : null;
            let prNumber = context.payload.pull_request?.number ?? (Number.isFinite(parsedInput) && parsedInput > 0 ? parsedInput : null);

            if (!prNumber && context.sha) {
              const { data: associatedPulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: context.sha,
              });
              const openAssociated = associatedPulls.find((pull) => pull.state === 'open') ?? associatedPulls[0];
              if (openAssociated?.number) {
                prNumber = openAssociated.number;
              }
            }

            if (!prNumber) {
              const refName = String(context.ref || '').replace('refs/heads/', '').trim();
              if (refName) {
                const { data: refPulls } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  head: `${owner}:${refName}`,
                  per_page: 1,
                });
                if (refPulls[0]?.number) {
                  prNumber = refPulls[0].number;
                }
              }
            }

            if (!prNumber || Number.isNaN(prNumber)) {
              core.setFailed('Missing pull request number (event, workflow input, and SHA association all failed)');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            function normalizeCandidate(raw) {
              let value = String(raw || '').replace(/\{[^}]*\}/g, ' ');
              value = value.replace(/https?:\/\/\S+/g, ' ');
              value = value.replace(/[<>]/g, ' ');
              value = value.replace(/\s+/g, ' ').trim();
              if (value.length < 12 || value.length > 100) return null;
              if (!/[a-zA-Z]/.test(value)) return null;
              if (value.split(/\s+/).length < 3) return null;
              if (/^(const|let|var|import|export|return|if|for|while|class|function)\b/.test(value)) return null;
              if (/[{};]/.test(value)) return null;
              return value;
            }

            function extractCandidatesFromPatch(patch) {
              if (!patch) return [];
              const out = [];
              for (const line of patch.split('\n')) {
                if (!line.startsWith('+') || line.startsWith('+++')) continue;
                const body = line.slice(1);

                for (const match of body.matchAll(/>([^<>]{4,160})</g)) {
                  const cleaned = normalizeCandidate(match[1]);
                  if (cleaned) out.push(cleaned);
                }

                for (const match of body.matchAll(/["'`]([^"'`]{6,160})["'`]/g)) {
                  const cleaned = normalizeCandidate(match[1]);
                  if (cleaned) out.push(cleaned);
                }
              }
              return out;
            }

            const landingFiles = files.filter((f) => f.filename.startsWith('landing/'));
            const landingTouched = landingFiles.length > 0;
            let demoEnabled = true;
            if (!landingTouched) {
              demoEnabled = false;
              core.warning('No landing/ UI changes in this PR; skipping demo generation');
            }

            const demoPath = '/';
            const demoSelector = '.hero__headline, .hero, h1';

            const prioritizedFiles = landingTouched ? landingFiles : [];
            const candidates = [];
            for (const file of prioritizedFiles) {
              for (const candidate of extractCandidatesFromPatch(file.patch)) {
                candidates.push(candidate);
              }
            }

            const seen = new Set();
            const uniqueCandidates = candidates.filter((candidate) => {
              const key = candidate.toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            const expectedText = uniqueCandidates[0] || '';
            if (!expectedText) {
              demoEnabled = false;
              core.warning('No targetable UI text extracted from this PR; skipping demo generation');
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_title', String(pr.title || ''));
            core.setOutput('demo_path', demoPath);
            core.setOutput('demo_selector', demoSelector);
            core.setOutput('expected_text', expectedText);
            core.setOutput('demo_enabled', demoEnabled ? 'true' : 'false');

      - name: Skip non-targetable PR demo
        if: steps.meta.outputs.demo_enabled != 'true'
        shell: bash
        run: |
          echo "Skipping PR demo: no targetable landing UI change was detected."

      - name: Install landing dependencies
        if: steps.meta.outputs.demo_enabled == 'true'
        working-directory: landing
        shell: bash
        run: |
          npm ci
          npm install --no-save playwright

      - name: Install browser dependencies
        if: steps.meta.outputs.demo_enabled == 'true'
        working-directory: landing
        shell: bash
        run: |
          npx playwright install --with-deps chromium

      - name: Start landing dev server
        if: steps.meta.outputs.demo_enabled == 'true'
        working-directory: landing
        shell: bash
        run: |
          npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/blastgit-demo-server.log 2>&1 &
          echo $! > /tmp/blastgit-demo-server.pid

      - name: Wait for app
        if: steps.meta.outputs.demo_enabled == 'true'
        shell: bash
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Dev server never became ready"
          cat /tmp/blastgit-demo-server.log || true
          exit 1

      - name: Capture real UI demo (strict)
        if: steps.meta.outputs.demo_enabled == 'true'
        working-directory: landing
        env:
          DEMO_URL: http://127.0.0.1:4173/
          DEMO_PATH: ${{ steps.meta.outputs.demo_path }}
          DEMO_SELECTOR: ${{ steps.meta.outputs.demo_selector }}
          DEMO_EXPECTED_TEXT: ${{ steps.meta.outputs.expected_text }}
          OUT_WEBM: ${{ github.workspace }}/pr-demo.webm
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const { chromium } = require("playwright");

          function escapeRegex(text) {
            return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          (async () => {
            const outWebm = process.env.OUT_WEBM;
            const baseUrl = process.env.DEMO_URL;
            const demoPath = (process.env.DEMO_PATH || "/").trim();
            const demoSelector = (process.env.DEMO_SELECTOR || "").trim();
            const expectedText = (process.env.DEMO_EXPECTED_TEXT || "").trim();

            const path = demoPath.startsWith("/") ? demoPath : `/${demoPath}`;
            const targetUrl = new URL(path, baseUrl).toString();

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              recordVideo: {
                dir: process.cwd(),
                size: { width: 1280, height: 720 },
              },
            });

            const page = await context.newPage();
            await page.goto(targetUrl, { waitUntil: "domcontentloaded", timeout: 120000 });

            if (demoSelector) {
              await page.waitForSelector(demoSelector, { timeout: 20000 });
            }
            await page.waitForTimeout(900);

            if (!expectedText) {
              throw new Error("Missing required expected text target for PR demo capture");
            }
            const expectedLocator = page.getByText(new RegExp(escapeRegex(expectedText), "i")).first();
            await expectedLocator.waitFor({ state: "visible", timeout: 15000 });
            await expectedLocator.scrollIntoViewIfNeeded();
            await page.waitForTimeout(900);

            await page.mouse.move(220, 140);
            await page.waitForTimeout(300);
            await page.evaluate(() => window.scrollTo({ top: 420, behavior: "smooth" }));
            await page.waitForTimeout(1000);
            await page.evaluate(() => window.scrollTo({ top: 980, behavior: "smooth" }));
            await page.waitForTimeout(1000);
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "smooth" }));
            await page.waitForTimeout(900);

            const nodes = await page.locator("a,button").elementHandles();
            for (const node of nodes.slice(0, 6)) {
              const box = await node.boundingBox();
              if (!box) continue;
              await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2);
              await page.waitForTimeout(240);
            }
            await page.waitForTimeout(1200);

            const video = page.video();
            await context.close();
            await browser.close();
            if (!video) throw new Error("No video captured");
            const captured = await video.path();
            fs.copyFileSync(captured, outWebm);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Ensure ffmpeg is available
        if: steps.meta.outputs.demo_enabled == 'true'
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Convert demo to mp4
        if: steps.meta.outputs.demo_enabled == 'true'
        shell: bash
        run: |
          ffmpeg -y -i pr-demo.webm -c:v libx264 -pix_fmt yuv420p -movflags +faststart pr-demo.mp4

      - name: Write demo metadata
        if: steps.meta.outputs.demo_enabled == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          EXPECTED_TEXT: ${{ steps.meta.outputs.expected_text }}
          DEMO_PATH: ${{ steps.meta.outputs.demo_path }}
          DEMO_SELECTOR: ${{ steps.meta.outputs.demo_selector }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = "pr-demo-meta.json";
          const metadata = {
            prNumber: Number(process.env.PR_NUMBER || "0"),
            expectedText: String(process.env.EXPECTED_TEXT || ""),
            demoPath: String(process.env.DEMO_PATH || ""),
            demoSelector: String(process.env.DEMO_SELECTOR || ""),
            generatedAt: new Date().toISOString(),
          };
          fs.writeFileSync(path, JSON.stringify(metadata, null, 2));
          NODE

      - name: Stop dev server
        if: always() && steps.meta.outputs.demo_enabled == 'true'
        shell: bash
        run: |
          if [ -f /tmp/blastgit-demo-server.pid ]; then
            kill "$(cat /tmp/blastgit-demo-server.pid)" >/dev/null 2>&1 || true
          fi

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-server-log
          path: /tmp/blastgit-demo-server.log

      - name: Upload demo artifact
        if: steps.meta.outputs.demo_enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-video-pr-${{ steps.meta.outputs.pr_number }}
          path: |
            pr-demo.mp4
            pr-demo-meta.json
          retention-days: 30
