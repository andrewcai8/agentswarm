name: Blastgit PR Demo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to render
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: blastgit-pr-demo-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  render-demo:
    name: Render PR demo video
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve PR metadata
        id: meta
        uses: actions/github-script@v8
        with:
          script: |
            const prNumberInput = core.getInput('pr_number');
            const prNumber = context.payload.pull_request?.number ?? (prNumberInput ? Number(prNumberInput) : null);
            if (!prNumber || Number.isNaN(prNumber)) {
              core.setFailed('Missing pull request number');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_title', String(pr.title || ''));

      - name: Install landing dependencies
        working-directory: landing
        shell: bash
        run: |
          npm ci
          npm install --no-save playwright

      - name: Install browser dependencies
        working-directory: landing
        shell: bash
        run: |
          npx playwright install --with-deps chromium

      - name: Start landing dev server
        working-directory: landing
        shell: bash
        run: |
          npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/blastgit-demo-server.log 2>&1 &
          echo $! > /tmp/blastgit-demo-server.pid

      - name: Wait for app
        shell: bash
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Dev server never became ready"
          cat /tmp/blastgit-demo-server.log || true
          exit 1

      - name: Capture real UI demo
        working-directory: landing
        env:
          DEMO_URL: http://127.0.0.1:4173/
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          OUT_WEBM: ${{ github.workspace }}/pr-demo.webm
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const { chromium } = require("playwright");

          (async () => {
            const outWebm = process.env.OUT_WEBM;
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              recordVideo: {
                dir: process.cwd(),
                size: { width: 1280, height: 720 },
              },
            });
            const page = await context.newPage();
            await page.goto(process.env.DEMO_URL, { waitUntil: "domcontentloaded", timeout: 120000 });
            await page.waitForTimeout(1500);

            // Capture a visible, deterministic walkthrough (scroll + hovers).
            await page.mouse.move(200, 120);
            await page.waitForTimeout(300);
            await page.evaluate(() => window.scrollTo({ top: 420, behavior: "smooth" }));
            await page.waitForTimeout(1000);
            await page.evaluate(() => window.scrollTo({ top: 980, behavior: "smooth" }));
            await page.waitForTimeout(1000);
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "smooth" }));
            await page.waitForTimeout(900);

            const nodes = await page.locator("a,button").elementHandles();
            for (const node of nodes.slice(0, 6)) {
              const box = await node.boundingBox();
              if (!box) continue;
              await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2);
              await page.waitForTimeout(240);
            }
            await page.waitForTimeout(1500);

            const video = page.video();
            await context.close();
            await browser.close();
            if (!video) throw new Error("No video captured");
            const path = await video.path();
            fs.copyFileSync(path, outWebm);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Ensure ffmpeg is available
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Convert demo to mp4
        shell: bash
        run: |
          ffmpeg -y -i pr-demo.webm -c:v libx264 -pix_fmt yuv420p -movflags +faststart pr-demo.mp4

      - name: Stop dev server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/blastgit-demo-server.pid ]; then
            kill "$(cat /tmp/blastgit-demo-server.pid)" >/dev/null 2>&1 || true
          fi

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-server-log
          path: /tmp/blastgit-demo-server.log

      - name: Upload demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-video
          path: pr-demo.mp4
          retention-days: 30
